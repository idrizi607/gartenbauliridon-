<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Experience | Albiona Idrizi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .title {
            font-size: 4vw;
            letter-spacing: 1rem;
            text-transform: uppercase;
            z-index: 10;
        }
        .bg-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: brightness(0.6);
        }
    </style>
</head>
<body>

    <section class="section" id="hero">
        <h1 class="title">Explore the Cosmos</h1>
    </section>

    <section class="section">
        <h2 class="title">Infinite Depth</h2>
    </section>

    <script>
        gsap.from(".title", {
            duration: 2,
            y: 50,
            opacity: 0,
            ease: "power4.out"
        });

        gsap.to("body", {
            scrollTrigger: {
                scrub: true
            },
            backgroundColor: "#1a1a2e"
        });
    </script>
</body>
</html>
